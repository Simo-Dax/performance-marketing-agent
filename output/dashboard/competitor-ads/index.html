<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Competitor Ads Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:opsz,wght@6..12,400;6..12,600;6..12,700;6..12,800&display=swap" rel="stylesheet">
<style>
  /* ===== Airbnb design tokens ===== */
  :root{
    --rausch:#FF385C;       /* Airbnb primary */
    --rausch-dark:#E00B41;
    --hof:#222222;          /* ink */
    --foggy:#717171;        /* muted */
    --paper:#ffffff;
    --bg:#ffffff;
    --line:#DDDDDD;
    --line-soft:#EBEBEB;
    --hover:#F7F7F7;
    --tof:#008489;          /* teal */
    --mof:#914669;          /* plum */
    --bof:#E07912;          /* amber */
    --proven:#008A05; --hot:#FF385C; --active:#0a7ea4; --retired:#717171; --short:#B0B0B0;
    --shadow:0 6px 16px rgba(0,0,0,.12);
    --shadow-sm:0 1px 2px rgba(0,0,0,.08);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:"Nunito Sans",-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:var(--bg);color:var(--hof);font-size:15px;-webkit-font-smoothing:antialiased}
  .app{display:grid;grid-template-columns:300px 1fr;min-height:100vh}

  /* ===== SIDEBAR ===== */
  .sidebar{background:var(--paper);border-right:1px solid var(--line-soft);padding:26px 22px;position:sticky;top:0;height:100vh;overflow-y:auto}
  .logo{font-weight:800;font-size:19px;letter-spacing:-.4px;margin-bottom:3px;display:flex;align-items:center;gap:8px}
  .logo .mark{width:22px;height:22px;border-radius:50%;background:var(--rausch);display:inline-block}
  .logo span{color:var(--rausch)}
  .sub{color:var(--foggy);font-size:12.5px;margin-bottom:26px}
  .filter-group{margin-bottom:26px}
  .filter-group h3{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:var(--hof);margin-bottom:12px;font-weight:800}
  .opt{display:flex;align-items:center;gap:11px;padding:9px 10px;border-radius:12px;cursor:pointer;font-size:14px;transition:background .15s}
  .opt:hover{background:var(--hover)}
  .opt input{accent-color:var(--rausch);width:17px;height:17px;cursor:pointer;border-radius:6px}
  .opt .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
  .opt .cnt{margin-left:auto;color:var(--foggy);font-size:12.5px;font-variant-numeric:tabular-nums}
  .reset{margin-top:6px;width:100%;padding:12px;border:1px solid var(--hof);background:var(--paper);border-radius:10px;color:var(--hof);font-size:13.5px;font-weight:700;cursor:pointer;transition:background .15s}
  .reset:hover{background:var(--hover)}

  /* ===== MAIN ===== */
  .main{padding:28px 36px}
  .topbar{display:flex;align-items:center;gap:14px;margin-bottom:24px;flex-wrap:wrap}
  .search{flex:1;min-width:220px;padding:14px 20px;border:1px solid var(--line);border-radius:40px;font-size:14px;background:var(--paper);box-shadow:var(--shadow-sm);font-family:inherit;transition:box-shadow .15s}
  .search:focus{outline:none;box-shadow:var(--shadow)}
  .sortsel{padding:13px 16px;border:1px solid var(--line);border-radius:40px;background:var(--paper);font-size:13.5px;cursor:pointer;font-family:inherit;font-weight:600;box-shadow:var(--shadow-sm)}
  .count{color:var(--foggy);font-size:14px;white-space:nowrap;font-weight:600}
  .count b{color:var(--hof);font-weight:800}

  /* ===== GRID (Airbnb listing style) ===== */
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:24px 18px}
  .card{background:var(--paper);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;cursor:default;transition:transform .18s}
  .card:hover{transform:translateY(-3px)}
  .card:hover .thumb{box-shadow:var(--shadow)}
  .thumb{position:relative;aspect-ratio:1/1;background:var(--hover);overflow:hidden;border-radius:14px;transition:box-shadow .18s}
  .thumb img{width:100%;height:100%;object-fit:cover;display:block}
  .thumb .ph{display:flex;align-items:center;justify-content:center;height:100%;color:#c8c8c8;font-size:13px}
  .tier{position:absolute;top:12px;left:12px;font-size:11.5px;font-weight:800;padding:6px 11px;border-radius:40px;background:var(--paper);color:var(--hof);box-shadow:var(--shadow-sm)}
  .tier .tdot{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:5px;vertical-align:middle}
  .fmt{position:absolute;top:12px;right:12px;font-size:11px;font-weight:700;padding:5px 9px;border-radius:40px;background:rgba(34,34,34,.72);color:#fff;backdrop-filter:blur(4px)}
  .cbody{padding:12px 4px 4px;display:flex;flex-direction:column;gap:7px;flex:1}
  .chead{display:flex;align-items:center;gap:9px}
  .clogo{width:24px;height:24px;border-radius:50%;object-fit:cover;background:var(--line-soft);flex-shrink:0}
  .cname{font-weight:800;font-size:15px;line-height:1.2;letter-spacing:-.2px}
  .tags{display:flex;gap:7px;flex-wrap:wrap}
  .tag{font-size:11.5px;font-weight:700;padding:4px 10px;border-radius:40px}
  .tag.aw{background:#FFF0F3;color:var(--rausch)}
  .tag.fn{color:#fff}
  .tag.tof{background:var(--tof)}.tag.mof{background:var(--mof)}.tag.bof{background:var(--bof)}
  .headline{font-size:13px;color:var(--foggy);line-height:1.4;max-height:3.6em;overflow:hidden}
  .kpis{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:4px}
  .kpi{background:var(--hover);border-radius:10px;padding:9px 11px}
  .kpi .l{font-size:10.5px;color:var(--foggy);text-transform:uppercase;letter-spacing:.3px;font-weight:700}
  .kpi .v{font-size:15px;font-weight:800;font-variant-numeric:tabular-nums;margin-top:1px}
  .clink{margin-top:auto;padding-top:6px;font-size:13px;font-weight:800;color:var(--hof);text-decoration:underline;text-underline-offset:2px}
  .clink:hover{color:var(--rausch)}
  .empty{grid-column:1/-1;text-align:center;padding:70px 20px;color:var(--foggy)}
  @media(max-width:820px){.app{grid-template-columns:1fr}.sidebar{position:static;height:auto;border-right:none;border-bottom:1px solid var(--line-soft)}}
</style>
</head>
<body>
<div class="app">
  <!-- SIDEBAR FILTERS -->
  <aside class="sidebar">
    <div class="logo"><span class="mark"></span>Competitor <span>Ads</span></div>
    <div class="sub" id="meta-sub">Swipe file · Meta Ad Library</div>

    <div class="filter-group">
      <h3>Competitor</h3>
      <div id="f-competitors"></div>
    </div>

    <div class="filter-group">
      <h3>Stage of Awareness</h3>
      <div id="f-awareness"></div>
    </div>

    <div class="filter-group">
      <h3>Funnel</h3>
      <div id="f-funnel"></div>
    </div>

    <div class="filter-group">
      <h3>Performance Tier</h3>
      <div id="f-tier"></div>
    </div>

    <button class="reset" onclick="resetFilters()">Reset filtri</button>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="topbar">
      <input class="search" id="search" placeholder="Cerca per headline, brand, CTA…" oninput="render()">
      <select class="sortsel" id="sort" onchange="render()">
        <option value="days_desc">Più longeve (giorni attivi)</option>
        <option value="days_asc">Più recenti</option>
        <option value="reach_desc">EU reach ↓</option>
        <option value="brand">Brand A-Z</option>
      </select>
      <div class="count"><b id="n">0</b> ads</div>
    </div>
    <div class="grid" id="grid"></div>
  </main>
</div>

<script>
// ====== STATE ======
const AWARENESS = ["Unaware","Problem-Aware","Solution-Aware","Product-Aware","Most-Aware"];
const FUNNEL = [["TOF","Top funnel","tof"],["MOF","Mid funnel","mof"],["BOF","Bottom funnel","bof"]];
const TIERS = [["PROVEN","Proven","proven"],["HOT","Hot","hot"],["ACTIVE","Active","active"],["RETIRED","Retired","retired"],["SHORT","Short run","short"]];
let DATA = {competitors:[], ads:[]};
const sel = {competitors:new Set(), awareness:new Set(), funnel:new Set(), tier:new Set()};

// ====== LOAD ======
async function load(){
  try{
    const r = await fetch('data.json',{cache:'no-store'});
    if(r.ok){ DATA = await r.json(); }
    else throw new Error('no file');
  }catch(e){ DATA = SAMPLE; document.getElementById('meta-sub').textContent='Demo data (sostituisci data.json)'; }
  buildFilters(); render();
}

// ====== FILTERS UI ======
function chk(container,label,value,group,color){
  const id=group+'_'+value;
  const el=document.createElement('label'); el.className='opt';
  el.innerHTML=`<input type="checkbox" value="${value}" onchange="toggle('${group}','${value.replace(/'/g,"")}')">`+
    (color?`<span class="dot" style="background:${color}"></span>`:'')+
    `<span>${label}</span><span class="cnt" id="cnt_${id}"></span>`;
  container.appendChild(el);
}
function buildFilters(){
  const fc=document.getElementById('f-competitors'); fc.innerHTML='';
  DATA.competitors.forEach(c=>chk(fc,c.name,c.id,'competitors'));
  const fa=document.getElementById('f-awareness'); fa.innerHTML='';
  AWARENESS.forEach(a=>chk(fa,a,a,'awareness'));
  const ff=document.getElementById('f-funnel'); ff.innerHTML='';
  FUNNEL.forEach(([v,l,cls])=>chk(ff,l,v,'funnel',`var(--${cls})`));
  const ft=document.getElementById('f-tier'); ft.innerHTML='';
  TIERS.forEach(([v,l,cls])=>chk(ft,l,v,'tier',`var(--${cls})`));
}
function toggle(group,value){
  const s=sel[group];
  s.has(value)?s.delete(value):s.add(value);
  render();
}
function resetFilters(){
  Object.values(sel).forEach(s=>s.clear());
  document.querySelectorAll('.sidebar input[type=checkbox]').forEach(c=>c.checked=false);
  document.getElementById('search').value='';
  render();
}

// ====== RENDER ======
function passes(ad){
  if(sel.competitors.size && !sel.competitors.has(ad.competitor_id)) return false;
  if(sel.awareness.size && !sel.awareness.has(ad.awareness_stage)) return false;
  if(sel.funnel.size && !sel.funnel.has(ad.funnel_stage)) return false;
  if(sel.tier.size && !sel.tier.has(ad.tier)) return false;
  const q=document.getElementById('search').value.trim().toLowerCase();
  if(q){
    const hay=((ad.headline||'')+' '+(ad.cta||'')+' '+compName(ad.competitor_id)).toLowerCase();
    if(!hay.includes(q)) return false;
  }
  return true;
}
function compName(id){ const c=DATA.competitors.find(x=>x.id===id); return c?c.name:id; }
function compLogo(id){ const c=DATA.competitors.find(x=>x.id===id); return c&&c.logo?c.logo:''; }

function render(){
  let ads=DATA.ads.filter(passes);
  const sort=document.getElementById('sort').value;
  ads.sort((a,b)=>{
    if(sort==='days_desc') return (b.days_active||0)-(a.days_active||0);
    if(sort==='days_asc')  return (a.days_active||0)-(b.days_active||0);
    if(sort==='reach_desc')return (b.eu_reach||0)-(a.eu_reach||0);
    if(sort==='brand')     return compName(a.competitor_id).localeCompare(compName(b.competitor_id));
    return 0;
  });
  document.getElementById('n').textContent=ads.length;
  updateCounts();

  const grid=document.getElementById('grid');
  if(!ads.length){ grid.innerHTML='<div class="empty">Nessuna ad con questi filtri.</div>'; return; }
  grid.innerHTML=ads.map(card).join('');
}

function card(ad){
  const tier=TIERS.find(t=>t[0]===ad.tier);
  const fn=FUNNEL.find(f=>f[0]===ad.funnel_stage);
  const reach=ad.eu_reach?fmtNum(ad.eu_reach):'n/d';
  const img=ad.image?`<img src="${ad.image}" loading="lazy" onerror="this.style.display='none';this.parentNode.innerHTML='<div class=ph>immagine non disponibile</div>'">`:'<div class="ph">no preview</div>';
  const logo=compLogo(ad.competitor_id);
  return `<div class="card">
    <div class="thumb">${img}
      ${tier?`<span class="tier"><span class="tdot" style="background:var(--${tier[2]})"></span>${tier[1]}</span>`:''}
      ${ad.format?`<span class="fmt">${ad.format}</span>`:''}
    </div>
    <div class="cbody">
      <div class="chead">
        ${logo?`<img class="clogo" src="${logo}" onerror="this.style.display='none'">`:'<div class="clogo"></div>'}
        <div class="cname">${compName(ad.competitor_id)}</div>
      </div>
      <div class="tags">
        ${ad.awareness_stage?`<span class="tag aw">${ad.awareness_stage}</span>`:''}
        ${fn?`<span class="tag fn ${fn[2]}">${fn[1]}</span>`:''}
      </div>
      ${ad.headline?`<div class="headline">${ad.headline}</div>`:''}
      <div class="kpis">
        <div class="kpi"><div class="l">Giorni attivi</div><div class="v">${ad.days_active!=null?ad.days_active:'n/d'}</div></div>
        <div class="kpi"><div class="l">EU reach</div><div class="v">${reach}</div></div>
        <div class="kpi"><div class="l">Varianti</div><div class="v">${ad.n_variants||1}</div></div>
        <div class="kpi"><div class="l">Dal</div><div class="v" style="font-size:13px">${ad.first_seen||'—'}</div></div>
      </div>
      ${ad.ad_library_url?`<a class="clink" href="${ad.ad_library_url}" target="_blank" rel="noopener">Apri in Ad Library</a>`:''}
    </div>
  </div>`;
}

function updateCounts(){
  const base=DATA.ads;
  DATA.competitors.forEach(c=>setCnt('competitors_'+c.id, base.filter(a=>a.competitor_id===c.id).length));
  AWARENESS.forEach(a=>setCnt('awareness_'+a, base.filter(x=>x.awareness_stage===a).length));
  FUNNEL.forEach(([v])=>setCnt('funnel_'+v, base.filter(x=>x.funnel_stage===v).length));
  TIERS.forEach(([v])=>setCnt('tier_'+v, base.filter(x=>x.tier===v).length));
}
function setCnt(id,n){ const el=document.getElementById('cnt_'+id); if(el) el.textContent=n; }
function fmtNum(n){ return n>=1e6?(n/1e6).toFixed(1)+'M':n>=1e3?(n/1e3).toFixed(1)+'k':n; }

// ====== SAMPLE (fallback se data.json manca) ======
const SAMPLE={
  competitors:[
    {id:"comp1",name:"Competitor Uno",logo:"",page_id:"000"},
    {id:"comp2",name:"Competitor Due",logo:"",page_id:"111"},
    {id:"comp3",name:"Competitor Tre",logo:"",page_id:"222"}
  ],
  ads:[
    {id:"a1",competitor_id:"comp1",image:"",headline:"Risolvi il problema in 7 giorni",cta:"Shop Now",format:"1:1",awareness_stage:"Problem-Aware",funnel_stage:"TOF",tier:"PROVEN",days_active:142,first_seen:"2025-11",eu_reach:840000,n_variants:6,ad_library_url:"https://www.facebook.com/ads/library"},
    {id:"a2",competitor_id:"comp1",image:"",headline:"Perché il nostro è diverso",cta:"Learn More",format:"4:5",awareness_stage:"Solution-Aware",funnel_stage:"MOF",tier:"HOT",days_active:31,first_seen:"2026-04",eu_reach:120000,n_variants:3,ad_library_url:"https://www.facebook.com/ads/library"},
    {id:"a3",competitor_id:"comp2",image:"",headline:"-30% solo questa settimana",cta:"Get Offer",format:"1:1",awareness_stage:"Most-Aware",funnel_stage:"BOF",tier:"ACTIVE",days_active:9,first_seen:"2026-05",eu_reach:45000,n_variants:2,ad_library_url:"https://www.facebook.com/ads/library"},
    {id:"a4",competitor_id:"comp3",image:"",headline:"Non sapevi che il problema esistesse",cta:"See How",format:"9:16",awareness_stage:"Unaware",funnel_stage:"TOF",tier:"PROVEN",days_active:88,first_seen:"2026-02",eu_reach:610000,n_variants:5,ad_library_url:"https://www.facebook.com/ads/library"},
    {id:"a5",competitor_id:"comp2",image:"",headline:"Il prodotto che cercavi",cta:"Shop Now",format:"4:5",awareness_stage:"Product-Aware",funnel_stage:"BOF",tier:"RETIRED",days_active:64,first_seen:"2025-09",eu_reach:230000,n_variants:1,ad_library_url:"https://www.facebook.com/ads/library"}
  ]
};

load();
</script>
</body>
</html>
